  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      color: #aaa;
    }

    /* ── Header ── */
    .gallery-header {
      text-align: center;
      padding: 4rem 1rem 2.5rem;
      border-bottom: 1px solid #111;
    }

    .gallery-title {
      font-family: 'Special Elite', serif;
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .gallery-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: #1e1e1e;
      text-transform: uppercase;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.2rem;
      font-family: 'Special Elite', serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: #1e1e1e;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .back-link:hover { color: #444; }

    /* ── Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
      padding: 3rem 2.5rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Frame ── */
    .frame {
      position: relative;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .frame-border {
      border: 1px solid #1a1a1a;
      padding: 10px;
      background: #050505;
      transition: border-color 0.3s;
      position: relative;
    }

    .frame:hover .frame-border { border-color: #333; }

    /* Corner ornaments */
    .frame-border::before,
    .frame-border::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: #2a2a2a;
      border-style: solid;
      transition: border-color 0.3s;
    }
    .frame-border::before { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
    .frame-border::after  { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }
    .frame:hover .frame-border::before,
    .frame:hover .frame-border::after { border-color: #555; }

    .frame-inner {
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      aspect-ratio: 4 / 3;
    }

    .frame-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.85) saturate(0.9);
      transition: filter 0.4s;
    }

    .frame:hover .frame-inner img { filter: brightness(1) saturate(1); }

    /* Placeholder state */
    .frame-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Special Elite', serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    /* Label below frame */
    .frame-label {
      padding: 0.8rem 0.2rem 0.3rem;
    }

    .frame-label-title {
      font-family: 'Special Elite', serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: #2e2e2e;
      margin-bottom: 2px;
      transition: color 0.3s;
    }

    .frame:hover .frame-label-title { color: #555; }

    .frame-label-artist {
      font-size: 10px;
      color: #1e1e1e;
      letter-spacing: 1px;
    }

    /* ── Mouse-following tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      display: none;
      max-width: 220px;
    }

    .tooltip-inner {
      background: #050505;
      border: 1px solid #1e1e1e;
      padding: 0.8rem 1rem;
    }

    .tooltip-title {
      font-family: 'Special Elite', serif;
      font-size: 12px;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 4px;
    }

    .tooltip-artist {
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .tooltip-caption {
      font-size: 11px;
      color: #222;
      line-height: 1.6;
      font-style: italic;
    }

    /* ── Corner ornaments for tooltip ── */
    .tooltip-inner::before,
    .tooltip-inner::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-color: #1e1e1e;
      border-style: solid;
    }
    .tooltip-inner::before { top: 3px; left: 3px; border-width: 1px 0 0 1px; }
    .tooltip-inner::after  { bottom: 3px; right: 3px; border-width: 0 1px 1px 0; }
    #tooltip { position: fixed; }
    .tooltip-inner { position: relative; }

    /* ── Mini sundial ── */
    #mini-sundial-wrap {
      position: fixed;
      bottom: -86px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      cursor: default;
      transition: bottom 0.5s cubic-bezier(0.34, 1.1, 0.64, 1), transform 0.35s ease;
      padding-bottom: 18px;
    }
    #mini-sundial-wrap:hover {
      bottom: -66px;
      transform: translateX(-50%) translateY(-2px);
    }
    #sundial-hover-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel Decorative', cursive;
      font-size: 8.5px;
      letter-spacing: 3.5px;
      color: #f8e8ad;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      text-shadow: 0 0 10px rgba(245, 192, 48, 0.28);
      background: linear-gradient(135deg, rgba(12, 9, 2, 0.82), rgba(36, 24, 8, 0.6));
      border: 1px solid rgba(245, 192, 48, 0.28);
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #mini-sundial-wrap:hover #sundial-hover-label {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }
  </style>

<script>
  (function() {
    var CX = 130, CY = 224, R = 85;
    function deg2rad(d) { return d * Math.PI / 180; }
    function polarXY(a, r) {
      var rad = deg2rad(a);
      return { x: CX + r * Math.cos(rad), y: CY - r * Math.sin(rad) };
    }
    function sunAngle(h, m) {
      return 180 - ((Math.max(6, Math.min(18, h + m/60)) - 6) / 12) * 180;
    }
    function moonAngle(h, m) {
      var t = h + m/60; if (t < 6) t += 24;
      return -((Math.max(18, Math.min(30, t)) - 18) / 12) * 180;
    }
    function pal(h, m) {
      var t = h + m/60;
      if (t < 5)  return {s0:'#080612',s1:'#050410',s2:'#000',   st:1.0,sg:0,   sb:0,  mg:0.4,mb:1.0};
      if (t < 7)  return {s0:'#3a1205',s1:'#180605',s2:'#060208',st:0.3,sg:0.55,sb:1.0,mg:0.15,mb:0.5};
      if (t < 10) return {s0:'#0c2442',s1:'#071228',s2:'#030c16',st:0.0,sg:0.8, sb:1.0,mg:0,  mb:0.1};
      if (t < 14) return {s0:'#08182e',s1:'#050e1c',s2:'#02080e',st:0.0,sg:0.9, sb:1.0,mg:0,  mb:0};
      if (t < 17) return {s0:'#101c2c',s1:'#080e18',s2:'#020810',st:0.0,sg:0.75,sb:1.0,mg:0,  mb:0};
      if (t < 19) return {s0:'#260e04',s1:'#100404',s2:'#060206',st:0.2,sg:0.5, sb:1.0,mg:0.1,mb:0.35};
      if (t < 21) return {s0:'#0a0514',s1:'#06030e',s2:'#000',   st:0.7,sg:0,   sb:0,  mg:0.3,mb:1.0};
      return             {s0:'#080612',s1:'#050410',s2:'#000',   st:1.0,sg:0,   sb:0,  mg:0.4,mb:1.0};
    }
    function sunFill(h) {
      if (h < 7)  return '#ffe090';
      if (h < 10) return '#fffce0';
      if (h < 14) return '#ffffff';
      if (h < 17) return '#ffee80';
      return '#ff8030';
    }
    function tick() {
      var now = new Date(), h = now.getHours(), m = now.getMinutes();
      var p = pal(h, m);
      document.getElementById('msky0').setAttribute('stop-color', p.s0);
      document.getElementById('msky1').setAttribute('stop-color', p.s1);
      document.getElementById('msky2').setAttribute('stop-color', p.s2);
      document.getElementById('mStars').setAttribute('opacity', p.st);

      var sp = polarXY(sunAngle(h, m), R);
      var sg = document.getElementById('mSunGlow');
      sg.setAttribute('cx', sp.x.toFixed(1)); sg.setAttribute('cy', sp.y.toFixed(1)); sg.setAttribute('opacity', p.sg);
      var sb = document.getElementById('mSunBody');
      sb.setAttribute('cx', sp.x.toFixed(1)); sb.setAttribute('cy', sp.y.toFixed(1));
      sb.setAttribute('fill', sunFill(h)); sb.setAttribute('opacity', p.sb);

      var mp = polarXY(moonAngle(h, m), R);
      var mg = document.getElementById('mMoonGlow');
      mg.setAttribute('cx', mp.x.toFixed(1)); mg.setAttribute('cy', mp.y.toFixed(1)); mg.setAttribute('opacity', p.mg);
      var mb = document.getElementById('mMoonBody');
      mb.setAttribute('cx', mp.x.toFixed(1)); mb.setAttribute('cy', mp.y.toFixed(1)); mb.setAttribute('opacity', p.mb);

      var opp = (sunAngle(h, m) + 180) % 360;
      var ge  = polarXY(opp, 44);
      var gEl = document.getElementById('mGnomon');
      gEl.setAttribute('x2', (CX + (ge.x-CX)*0.55).toFixed(1));
      gEl.setAttribute('y2', Math.min(CY, CY + (ge.y-CY)*0.55).toFixed(1));
    }
    tick();
    setInterval(tick, 60000);
  })();
</script>
