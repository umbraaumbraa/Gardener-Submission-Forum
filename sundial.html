<script>
  var CX = 260, CY = 452, R = 174;

  function deg2rad(d) { return d * Math.PI / 180; }

  function sunAngleDeg(h, m) {
    var t = Math.max(6, Math.min(18, h + m / 60));
    return 180 - ((t - 6) / 12) * 180;
  }

  function moonAngleDeg(h, m) {
    var t = h + m / 60;
    if (t < 6) t += 24;
    var clamped = Math.max(18, Math.min(30, t));
    var frac = (clamped - 18) / 12;
    return -(frac * 180);
  }

  function polarToXY(angleDeg, r) {
    var rad = deg2rad(angleDeg);
    return { x: CX + r * Math.cos(rad), y: CY - r * Math.sin(rad) };
  }

  function getPalette(h, m) {
    var t = h + m / 60;
    if (t < 5)   return { sky0:'#080612', sky1:'#050410', sky2:'#000',    stars:1.0, sunG:0,    sunB:0,   moonG:0.38, moonB:1.0, rays:0,   gnomon:'#2a2a40' };
    if (t < 7)   return { sky0:'#3a1205', sky1:'#180605', sky2:'#060208', stars:0.3, sunG:0.55, sunB:1.0, moonG:0.18, moonB:0.5, rays:0.5, gnomon:'#7a5a20' };
    if (t < 10)  return { sky0:'#0c2442', sky1:'#071228', sky2:'#030c16', stars:0.0, sunG:0.82, sunB:1.0, moonG:0,   moonB:0.1, rays:0.8, gnomon:'#a08030' };
    if (t < 14)  return { sky0:'#08182e', sky1:'#050e1c', sky2:'#02080e', stars:0.0, sunG:0.9,  sunB:1.0, moonG:0,   moonB:0,   rays:0.9, gnomon:'#c0a040' };
    if (t < 17)  return { sky0:'#101c2c', sky1:'#080e18', sky2:'#020810', stars:0.0, sunG:0.76, sunB:1.0, moonG:0,   moonB:0,   rays:0.7, gnomon:'#9a7a28' };
    if (t < 19)  return { sky0:'#260e04', sky1:'#100404', sky2:'#060206', stars:0.2, sunG:0.5,  sunB:1.0, moonG:0.12,moonB:0.4, rays:0.3, gnomon:'#6a4018' };
    if (t < 21)  return { sky0:'#0a0514', sky1:'#06030e', sky2:'#000',    stars:0.7, sunG:0,    sunB:0,   moonG:0.3, moonB:1.0, rays:0,   gnomon:'#2a2a40' };
    return               { sky0:'#080612', sky1:'#050410', sky2:'#000',    stars:1.0, sunG:0,    sunB:0,   moonG:0.38,moonB:1.0, rays:0,   gnomon:'#2a2a40' };
  }

  function getSunColor(h) {
    if (h < 7)  return '#ffe090';
    if (h < 10) return '#fffce0';
    if (h < 14) return '#ffffff';
    if (h < 17) return '#ffee80';
    return '#ff8030';
  }

  function fmt2(n) { return n < 10 ? '0' + n : '' + n; }

  function update() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();

    var ampm = h >= 12 ? 'pm' : 'am';
    var h12 = h % 12 || 12;
    document.getElementById('time-display').textContent =
      h12 + ':' + fmt2(m) + ':' + fmt2(s) + ' ' + ampm;

    var pal = getPalette(h, m);

    document.getElementById('sky0').setAttribute('stop-color', pal.sky0);
    document.getElementById('sky1').setAttribute('stop-color', pal.sky1);
    document.getElementById('sky2').setAttribute('stop-color', pal.sky2);
    document.getElementById('stars').setAttribute('opacity', pal.stars);

    var sPos = polarToXY(sunAngleDeg(h, m), R);
    var sg = document.getElementById('sunGlow');
    sg.setAttribute('cx', sPos.x.toFixed(1)); sg.setAttribute('cy', sPos.y.toFixed(1));
    sg.setAttribute('r', '76'); sg.setAttribute('opacity', pal.sunG);

    var sb = document.getElementById('sunBody');
    sb.setAttribute('cx', sPos.x.toFixed(1)); sb.setAttribute('cy', sPos.y.toFixed(1));
    sb.setAttribute('fill', getSunColor(h)); sb.setAttribute('opacity', pal.sunB);

    var raysEl = document.getElementById('sunRays');
    raysEl.setAttribute('opacity', pal.rays);
    var rayAngles = [0,45,90,135,180,225,270,315];
    for (var i = 0; i < 8; i++) {
      var ra  = deg2rad(rayAngles[i]);
      var el  = document.getElementById('sr' + i);
      el.setAttribute('x1', (sPos.x + 20 * Math.cos(ra)).toFixed(1));
      el.setAttribute('y1', (sPos.y - 20 * Math.sin(ra)).toFixed(1));
      el.setAttribute('x2', (sPos.x + 27 * Math.cos(ra)).toFixed(1));
      el.setAttribute('y2', (sPos.y - 27 * Math.sin(ra)).toFixed(1));
    }

    var mPos = polarToXY(moonAngleDeg(h, m), R);
    var mg = document.getElementById('moonGlow');
    mg.setAttribute('cx', mPos.x.toFixed(1)); mg.setAttribute('cy', mPos.y.toFixed(1));
    mg.setAttribute('r', '62'); mg.setAttribute('opacity', pal.moonG);

    var mb = document.getElementById('moonBody');
    mb.setAttribute('cx', mPos.x.toFixed(1)); mb.setAttribute('cy', mPos.y.toFixed(1));
    mb.setAttribute('opacity', pal.moonB);

    var offsets = [[-5,-4],[4,5],[-2,3]];
    for (var j = 0; j < 3; j++) {
      var mc = document.getElementById('mc' + j);
      mc.setAttribute('cx', (mPos.x + offsets[j][0]).toFixed(1));
      mc.setAttribute('cy', (mPos.y + offsets[j][1]).toFixed(1));
    }
    document.getElementById('moonDetail').setAttribute('opacity',
      pal.moonB > 0.3 ? (pal.moonB * 0.8).toFixed(2) : '0');

    var oppAngle = (sunAngleDeg(h, m) + 180) % 360;
    var gEnd = polarToXY(oppAngle, 50);
    var gEl = document.getElementById('gnomon');
    gEl.setAttribute('x2', (CX + (gEnd.x - CX) * 0.55).toFixed(1));
    gEl.setAttribute('y2', Math.min(CY, CY + (gEnd.y - CY) * 0.55).toFixed(1));
    gEl.setAttribute('stroke', pal.gnomon);

    var cr = document.getElementById('code-reveal');
    if (h >= 6 && h < 12) { cr.textContent = 'ROTTEN'; cr.classList.add('shown'); }
    else                   { cr.textContent = '';       cr.classList.remove('shown'); }
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
