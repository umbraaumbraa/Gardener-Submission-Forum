      overflow: hidden;

    .cm-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
    .cm-bl { bottom: 10px; left: 10px;  border-width: 0 0 1px 1px; }
    .cm-br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

      color: #1a0e04;
      text-indent: 10px;
      opacity: 0;
      transition: opacity 1.8s ease 0.6s;
    }
    #hidden-word.revealed { opacity: 1; }

    #book-open {
      transition: opacity 0.25s ease;
    }
    #book-open.turning {
      opacity: 0;
    }
  </style>
</head>

<script>
var chapters = [
  {
    part: 'Part I · The Genesis & The Primordial Drought',
    num: 1,
    title: 'The Parched Earth',
    verses: [
      'In the old days, the land was a barren skull, cracked under the gaze of gods who fed on famine.',
      'The sky was an iron sheet, yielding neither dew nor shadow, and the soil turned to flint beneath the feet of the desperate.',
      'Men dug into the bellies of dead rivers, pulling up nothing but hot sand and the teeth of things that had perished before them.',
      'The old gods sat upon the ridges of the dry mountains, their mouths open to catch the smoke of burning bones, for they grew fat only when the world withered.',
      'Then did the elders of the village gather at the boundary stones, their tongues swollen with dust, and they wept into the dirt, but the dirt gave nothing back.',
    ]
  },
  {
    num: 2,
    title: 'The Calling of the Vessel',
    verses: [
      'There lived in that grey country a child who had no house, born during the month of the shifting salt, whose lineage was written only in the wind.',
      'The village looked upon the child with narrow eyes, for those who have nothing are ever feared by those who are losing everything.',
      'When the misery of the drought had eaten the last seed-grain, the old gods spoke through the mouth of a frantic seer, saying, The sky is a locked gate, and the key is a blood-gift.',
      'Give us that which has no weight in your ledgers, said the gods of the ridge, and we shall break the iron above your heads.',
      'The elders knew the child by name, though they wiped that name from the village bricks before the sun could set, that their consciences might remain as empty as their storehouses.',
    ]
  },
  {
    num: 3,
    title: 'The Descent into the Dry Well',
    verses: [
      'At the center of that dying place stood the great well, a deep throat lined with rough stone that had not known a bucket for three generations.',
      'They led the child to the coping stones at midnight, when the stars were like cold needles in the blackness.',
      'The child went down into the dark alone, climbing by the iron rungs that flaked like rust against the palms.',
      'And when the child\'s feet touched the silt at the bottom, the old gods mocked the village from high above, fleeing their stone altars because they had traded their ancient dominion for a single mortal soul.',
      'In that same hour, the first drop fell upon the forehead of the elders, and the well began to fill from beneath, though there was no spring below.',
    ]
  },
  {
    num: 4,
    title: 'The First Deluge',
    verses: [
      'The water rose out of the pit like an awakening beast, pouring over the stones and filling the ditches until the valleys became lakes.',
      'The people shouted with joy, washing the grey dust from their garments and drinking until their bellies were tight.',
      'But the sun did not return on the third day, nor on the seventh, nor in the month that followed.',
      'The rain became the wall and the roof of the world, a heavy curtain that shut out the horizon, and the people realized the child had not bought them a season, but an eternity.',
    ]
  },
  {
    part: 'Part II · The Era of the Scribe',
    num: 5,
    title: 'The Gift of the Tongue',
    verses: [
      'When the generations had learned to build their dwellings upon the high rocks, the Waters chose a servant from among the fishermen, whose name was Sevirah.',
      'The spirit of the storm came upon him by the shore, and his ears were opened to the cadence of the downpour.',
      'He heard the sorrow of the well in every heavy drop, and he took up a reed to write the words upon tablets of black slate.',
      'Sevirah spoke with a voice like the rushing of a weir, telling the people that the Rain was a mirror, meant to show them the rot in their own hearts and the necessity of common mercy.',
      'And for forty years he wrote the true words, sparing neither king nor beggar, for the water knows no difference between the wool of the rich and the rags of the poor.',
    ]
  },
  {
    num: 6,
    title: 'The Hardening of Hearts',
    verses: [
      'But the people grew weary of the mirror, for it is a painful thing to stand naked in the downpour and see the smallness of one\'s soul.',
      'They desired a god who would bless their granaries and curse their enemies, rather than a spirit that demanded they share their bread in the storm.',
      'They built high roofs over their councils that they might not hear the thunder, and they walked past Sevirah as he sat by the gates, leaving his tablets to gather moss.',
      'Sevirah saw the silence of the people and was afraid, for he loved the Waters more than his own breath, and he could not endure the thought of a world where the voice of his master was dead.',
    ]
  },
  {
    num: 7,
    title: 'The Self-Inflicted Blade',
    verses: [
      'In the winter of his year, Sevirah took up his stylus with a trembling hand and went into the dark of his chamber.',
      'He looked upon the ancient verses, where it was written that the Rain fell to wash away the pride of men, and his heart failed him.',
      'He said to himself, If I give them the hard truth, they will perish in their indifference, but if I give them a crown, they will bow.',
      'So he scraped the slate with a sharp flint, changing the commandment of mercy into a demand for sacrifice.',
      'Where the water had said, Look upon your brother, Sevirah wrote, Judge those who are unclean, and the people returned to the temples with gifts of gold, pleased that their cruelty had been given a divine title.',
    ]
  },
  {
    num: 8,
    title: 'The Casting Out of the Scribe',
    verses: [
      'Then the sky grew dark with a terrible purple weight, and the voice of the Waters broke through the roof of Sevirah\'s house like a fallen mast.',
      'Out of all my subjects, said the spirit, you are the one I least expected to betray me.',
      'Sevirah fell upon his face among his ruined papers, crying out, It was not betrayal, but editing, for the world did not want the truth, and I gave them comfort that they might remain faithful.',
      'The Waters answered him with a sound like tearing canvas, saying, You have traded the deep current for a shallow puddle, and your name shall be a curse among those who seek the sea.',
      'And Sevirah was cast out into the trackless mist, stripped of his tongue, leaving behind a book that was half light and half poison.',
    ]
  },
  {
    part: 'Part III · The Revelations of the Trial',
    num: 11,
    title: 'The Architecture of the Trials',
    verses: [
      'When the voice of the Waters fell silent after the departure of Sevirah, the sky did not clear, but changed its purpose.',

      'Within the heart of the storm, the paths shift according to the intent of the traveler, so that those who enter seeking wealth are led into bogs of salt, and those who seek renown are lost in the roaring gale.',
      'The temple priests preach that the Trials are a sieve to separate the pure from the wicked, but they lie, for the storm seeks only the weight of the original well.',
    ]
  },
  {
    num: 12,
    title: 'The Vision of the Final Well',
    verses: [
      'I saw a vision of the end of days, when the great dams of the earth shall break and the rain shall touch the topmost branches of the holy cedar trees.',
      'In that hour, the false books of Sevirah shall dissolve like flour in the flood, and the altars of driftwood shall float away like chaff.',
      'A single soul shall come down from the ridges, having no crown, no law, and no claim upon the heavens.',
      'This traveler shall walk into the eye of the deluge, not to escape the judgment, nor to command the lightning, but to take the hand of the child who still sits at the bottom of the dark.',
      'Then shall the rain cease its weeping, and the living waters shall find their rest, speaking no more through the mouths of priests, but dwelling in the hearts of those who have learned to flow together.',
    ]
  },
];

  { left: 4,    right: 5,    pageNums: ['V',   'VI']  },
  { left: 6,    right: 7,    pageNums: ['VII', 'VIII'] },
  { left: 8,    right: 9,    pageNums: ['IX',  'X']   },
  { left: null, right: null, pageNums: ['XI',  'XII'], final: true },
];

var currentSpread = 0;
var scribbleRevealed = false;

function buildChapter(ch, showPart) {
  var html = '';
  if (showPart && ch.part) {
    html += '<div style="font-family:\'Cinzel\',serif;font-size:7px;letter-spacing:3px;color:#8a6030;text-transform:uppercase;margin-bottom:0.7rem;opacity:0.7;">' + ch.part + '</div>';
  }
  html += '<div class="chapter">';
  html += '<div class="ch-heading">Chapter ' + ch.num + '</div>';
  html += '<div class="ch-sub">' + ch.title + '</div>';
  ch.verses.forEach(function(v, i) {
    html += '<p class="verse"><sup class="verse-num">' + (i+1) + '</sup>' + v + '</p>';
  });
  html += '</div>';
  return html;
}

function buildPageContent(chapterIndex) {
  if (chapterIndex === null || chapterIndex === undefined) return '';
  var showPart = (chapterIndex === 0 || chapterIndex === 4 || chapterIndex === 8);
  return buildChapter(chapters[chapterIndex], showPart);
}

function buildFinalLeft() {
  return '<div style="height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1.2rem;opacity:0.35;">' +
    '<div style="font-family:\'Cinzel\',serif;font-size:8px;letter-spacing:4px;color:#3a2808;text-transform:uppercase;">— Finis —</div>' +
    '<div style="width:60%;height:1px;background:rgba(80,50,15,0.2);"></div>' +
    '<div style="font-family:\'IM Fell English\',serif;font-style:italic;font-size:9px;color:#5a3a18;text-align:center;line-height:1.8;">' +
      'Here ends the Codex of the Well,<br>as recorded in the year of the fifth silence.<br>May the water judge the reader<br>as the reader has judged the water.' +
    '</div>' +
  '</div>';
}

function buildFinalRight() {
  return '<div id="final-scribble-wrap">' +
    '<div id="scribble-btn" onclick="revealWord()" title="click to reveal">' +
      '<svg id="scribble-svg" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg">' +
        buildScribble() +
      '</svg>' +
      '<div id="hidden-word">UMBRA</div>' +
    '</div>' +
  '</div>';
}

function buildScribble() {
  var lines = [
    'M10,15 Q30,8 50,18 Q70,28 90,12 Q110,2 130,14 Q150,24 170,10',
    'M8,22  Q25,30 48,20 Q68,12 92,22 Q112,30 135,18 Q158,8 172,20',
    'M12,30 Q35,22 55,32 Q78,40 100,28 Q122,18 145,30 Q162,38 170,28',
    'M10,38 Q28,30 52,40 Q74,48 96,36 Q118,26 142,38 Q160,46 172,36',
    'M8,46  Q30,38 54,48 Q76,56 98,44 Q120,34 144,46 Q164,52 172,44',
    'M15,12 Q18,28 14,44 Q12,52 16,56',
    'M30,8  Q28,24 32,40 Q34,50 30,56',
    'M50,10 Q52,26 48,42 Q46,52 50,58',
    'M72,8  Q70,24 74,40 Q76,50 72,56',
    'M92,6  Q94,22 90,38 Q88,50 92,56',
    'M112,8 Q110,24 114,40 Q116,50 112,56',
    'M132,6 Q134,22 130,38 Q128,50 132,56',
    'M152,8 Q150,24 154,40 Q156,50 152,56',
    'M6,18  Q90,10 174,16',
    'M6,34  Q90,26 174,32',
    'M6,50  Q90,42 174,48',
    'M20,6  Q22,30 20,54',
    'M60,4  Q62,30 60,56',
    'M100,4 Q102,30 100,56',
    'M140,4 Q142,30 140,56',
  ];
  var svg = '';
  lines.forEach(function(d, i) {
    var opacity = 0.55 + (i % 3) * 0.12;
    var width   = 1.2 + (i % 4) * 0.35;
    svg += '<path d="' + d + '" fill="none" stroke="#1a0e04" stroke-width="' + width.toFixed(1) + '" stroke-linecap="round" opacity="' + opacity.toFixed(2) + '"/>';
  });
  return svg;
}

function revealWord() {
  if (scribbleRevealed) return;
  scribbleRevealed = true;
  var scrib = document.getElementById('scribble-svg');
  var word  = document.getElementById('hidden-word');
  if (scrib) scrib.classList.add('fading');
  if (word)  word.classList.add('revealed');
}

function renderSpread(idx) {
  var sp = SPREADS[idx];

  if (sp.final) {
    document.getElementById('left-content').innerHTML  = buildFinalLeft();
    document.getElementById('right-content').innerHTML = buildFinalRight();
  } else {
    document.getElementById('left-content').innerHTML  = buildPageContent(sp.left);
    document.getElementById('right-content').innerHTML = buildPageContent(sp.right);
  }

  document.getElementById('left-num').textContent  = sp.pageNums[0];
  document.getElementById('right-num').textContent = sp.pageNums[1];

  var al = document.getElementById('arrow-left');
  var ar = document.getElementById('arrow-right');
  if (idx > 0) al.classList.add('visible'); else al.classList.remove('visible');
  if (idx < SPREADS.length-1) ar.classList.add('visible'); else ar.classList.remove('visible');
}

//  FLIP
function flipPage(dir) {
  var next = currentSpread + dir;
  if (next < 0 || next >= SPREADS.length) return;

  var openEl = document.getElementById('book-open');
  openEl.classList.add('turning');
  setTimeout(function() {
    currentSpread = next;
    renderSpread(currentSpread);
    openEl.classList.remove('turning');
  }, 250);
}

//  OPEN BOOK
function openBook() {
  var closed = document.getElementById('book-closed');
  var open   = document.getElementById('book-open');

  closed.classList.add('hidden');
  setTimeout(function() {
    closed.style.display = 'none';
    open.classList.add('visible');
    renderSpread(0);
    setTimeout(function() {
      document.getElementById('arrow-right').classList.add('visible');
    }, 400);
  }, 600);
}
</script>
</body>
</html>
