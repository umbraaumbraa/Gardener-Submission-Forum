<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Garden of Honor</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07050a;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'IM Fell English', serif;
      cursor: none;
      user-select: none;
    }
    #scene {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Atmospheric background */
    #bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%,   #1a1408 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 20% 80%,  #0e0a04 0%, transparent 60%),
        radial-gradient(ellipse 80% 50% at 80% 80%,  #0e0a04 0%, transparent 60%),
        #07050a;
      transition: background 8s ease;
    }
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 35%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 12;
    }

    /* Ground surface */
    #ground-svg {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 42vh;
      overflow: visible;
    }

    /* Puddle */
    #puddle {
      position: absolute;
      bottom: 42vh;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      background: radial-gradient(ellipse at 50% 70%,
        rgba(30,55,80,0.75) 0%,
        rgba(15,30,45,0.4) 55%,
        transparent 100%);
      border-radius: 50%;
      transition: width 5s ease, height 5s ease, opacity 4s ease;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Flower SVG canvas — pot bottom is at y=232 in 420px viewBox = 188px from canvas bottom.
       We position bottom edge of SVG at table surface, then lift by those 188px so pot sits flush. */
    #main-svg {
      position: absolute;
      bottom: calc(42vh - 188px);
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 420px;
      overflow: visible;
      z-index: 3;
    }

    /* Watering can */
    #can-wrap {
      position: fixed;
      z-index: 30;
      pointer-events: auto;
      width: 130px;
      height: 100px;
      cursor: grab;
      transform-origin: 55% 40%;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #can-wrap.grabbed { cursor: grabbing; }

    /* Cursor */
    #cursor-dot {
      position: fixed;
      width: 5px; height: 5px;
      background: rgba(200,160,80,0.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%,-50%);
    }

    /* Droplets */
    .droplet {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      border-radius: 50% 50% 45% 45%;
    }

    /* Paper */
    #paper {
      position: absolute;
      bottom: 42vh;
      left: 50%;
      transform: translateX(-50%) rotate(-4deg);
      width: 80px; height: 100px;
      display: none;
      cursor: pointer;
      z-index: 2;
    }

    /* Overlay */
    #paper-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(3px);
      cursor: pointer;
    }
    #paper-overlay.show { display: flex; }
    #paper-doc {
      background: #e2cc90;
      width: min(480px, 88vw);
      padding: 5rem 4.5rem;
      position: relative;
      text-align: center;
      box-shadow: 0 30px 90px rgba(0,0,0,0.9), inset 0 0 50px rgba(80,50,10,0.12);
      cursor: default;
    }
    #paper-doc::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 200px 140px at 3% 3%,   rgba(100,60,10,0.2) 0%, transparent 100%),
        radial-gradient(ellipse 150px 120px at 97% 97%,  rgba(80,45,8,0.18) 0%, transparent 100%),
        radial-gradient(ellipse 100px 80px at 85% 8%,    rgba(70,40,5,0.12) 0%, transparent 100%),
        radial-gradient(ellipse 80px 100px at 5% 90%,    rgba(90,50,8,0.1) 0%, transparent 100%);
      pointer-events: none;
    }
    #paper-doc::after {
      content: ''; position: absolute; inset: 18px;
      border: 1px solid rgba(110,70,25,0.2);
      pointer-events: none;
    }
    .paper-word {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 44px;
      letter-spacing: 18px;
      color: #160c02;
      display: block;
      margin-bottom: 3rem;
      text-indent: 18px;
    }
    .paper-hint {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 11px;
      letter-spacing: 3px;
      color: #7a5530;
    }

    /* Stage label */
    #stage-label {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(160,100,40,0);
      transition: color 2.5s ease;
      z-index: 15;
      pointer-events: none;
      white-space: nowrap;
    }
    #stage-label.show { color: rgba(160,100,40,0.65); }
    #stage-label.urgent { color: rgba(180,70,20,0.8) !important; }

    /* Back link */
    #back-link {
      position: fixed;
      top: 2rem; left: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 4px;
      color: #221808;
      text-decoration: none;
      text-transform: uppercase;
      z-index: 15;
      transition: color 0.3s;
    }
    #back-link:hover { color: #6a4a20; }

    /* Hint */
    #grab-hint {
      position: fixed;
      bottom: 5rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(140,100,50,0.45);
      pointer-events: none;
      z-index: 15;
      transition: opacity 1.2s ease;
      white-space: nowrap;
    }
    #grab-hint.hide { opacity: 0; }

    /* Falling note */
    #falling-note {
      position: absolute;
      left: 50%;
      top: 20vh;
      transform: translateX(-20px) rotate(-8deg);
      z-index: 5;
      display: none;
      cursor: pointer;
      pointer-events: none;
    }
    #falling-note.drop {
      display: block;
      pointer-events: none;
      animation: noteFall 2s cubic-bezier(0.33, 0.1, 0.45, 1.0) forwards;
    }
    #falling-note.landed {
      display: block;
      pointer-events: auto;
      cursor: pointer;
      position: absolute;
      top: calc(58vh - 115px);
      left: 50%;
      transform: translateX(-20px) rotate(-5deg);
      z-index: 16;
    }
    #falling-note.landed:hover #note-svg {
      filter: brightness(1.1);
    }
    @keyframes noteFall {
      0%   { top: 20vh;              opacity: 0; transform: translateX(-20px) rotate(-15deg); }
      12%  { opacity: 1; }
      55%  { transform: translateX(-20px) rotate(7deg); }
      78%  { transform: translateX(-20px) rotate(-4deg); }
      92%  { transform: translateX(-20px) rotate(-6deg); }
      100% { top: calc(58vh - 115px); opacity: 1; transform: translateX(-20px) rotate(-5deg); }
    }


    .dust {
      position: absolute;
      border-radius: 50%;
      background: rgba(180,140,60,0.1);
      pointer-events: none;
      animation: floatdust linear infinite;
    }
    @keyframes floatdust {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 0.3; }
      100% { transform: translate(var(--dx), -100px) scale(0.5); opacity: 0; }
    }
  </style>
</head>

<script>
  var decay      = 0;
  var DECAY_FULL = 48000;
  var isHolding  = false;
  var isPouring  = false;
  var lastTime   = null;
  var dropPool   = [];
  var dropTimer  = 0;
  var moldSpawned = false;
  var canX = window.innerWidth * 0.70;
  var canY = window.innerHeight * 0.30;
  var grabOffX = 0, grabOffY = 0;

  var canEl     = document.getElementById('can-wrap');
  var cursorDot = document.getElementById('cursor-dot');

  canEl.addEventListener('mousedown', function(e) {
    e.preventDefault();
    isHolding = true;
    var r = canEl.getBoundingClientRect();
    grabOffX = e.clientX - r.left;
    grabOffY = e.clientY - r.top;
    canEl.classList.add('grabbed');
    canEl.style.transform = 'rotate(-42deg)';
    checkPouring();
    document.getElementById('grab-hint').classList.add('hide');
  });

  document.addEventListener('mousemove', function(e) {
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top  = e.clientY + 'px';
    if (isHolding) {
      canX = e.clientX - grabOffX;
      canY = e.clientY - grabOffY;
      canEl.style.left = canX + 'px';
      canEl.style.top  = canY + 'px';
      checkPouring();
    }
  });

  document.addEventListener('mouseup', function() {
    if (!isHolding) return;
    isHolding = false;
    isPouring = false;
    canEl.classList.remove('grabbed');
    canEl.style.transform = 'rotate(0deg)';
  });

  function getSpoutTip() {
    var r = canEl.getBoundingClientRect();
    var pivotX = r.left + r.width  * 0.55;
    var pivotY = r.top  + r.height * 0.40;
    var roseLocalX = r.left + (9  / 130) * r.width;
    var roseLocalY = r.top  + (58 / 100) * r.height;
    var dx = roseLocalX - pivotX;
    var dy = roseLocalY - pivotY;
    var angle = isHolding ? -42 * Math.PI / 180 : 0;
    var rx2 = dx * Math.cos(angle) - dy * Math.sin(angle);
    var ry2 = dx * Math.sin(angle) + dy * Math.cos(angle);
    return { x: pivotX + rx2, y: pivotY + ry2 };
  }

  function getFlowerZone() {
    var s = document.getElementById('main-svg');
    var r = s.getBoundingClientRect();
    return { x: r.left + r.width * 0.5, y: r.top + r.height * 0.05 };
  }

  function dist(ax, ay, bx, by) {
    return Math.sqrt((ax-bx)*(ax-bx)+(ay-by)*(ay-by));
  }

  function checkPouring() {
    if (decay >= 1) { isPouring = false; return; }
    var tip = getSpoutTip();
    var fz  = getFlowerZone();
    isPouring = isHolding && dist(tip.x, tip.y, fz.x, fz.y) < 180;
  }

  function spawnDroplet() {
    var tip = getSpoutTip();
    var d = document.createElement('div');
    d.className = 'droplet';
    var sz = 3.5 + Math.random() * 3;
    d.style.cssText =
      'width:' + sz + 'px;' +
      'height:' + (sz * 1.7) + 'px;' +
      'left:' + (tip.x + (Math.random()-0.5)*8) + 'px;' +
      'top:'  + tip.y + 'px;' +
      'background:radial-gradient(ellipse at 35% 25%,' +
        (decay < 0.5 ? '#b8e0f8' : '#90c4e8') + ' 0%,' +
        (decay < 0.5 ? '#6aaad0' : '#4a88b0') + ' 55%,' +
        (decay < 0.5 ? '#4a80aa' : '#2a5880') + ' 100%);';
    document.body.appendChild(d);
    dropPool.push({
      el: d,
      x: tip.x + (Math.random()-0.5)*6,
      y: tip.y,
      vx: (Math.random()-0.5)*1.4 - 0.3,
      vy: 1.8 + Math.random() * 2.2,
      life: 1
    });
  }

  function updateDroplets(dt) {
    for (var i = dropPool.length-1; i >= 0; i--) {
      var dp = dropPool[i];
      dp.x  += dp.vx;
      dp.y  += dp.vy;
      dp.vy += 0.32;
      dp.life -= dt / 950;
      dp.el.style.left    = dp.x + 'px';
      dp.el.style.top     = dp.y + 'px';
      dp.el.style.opacity = Math.max(0, dp.life * 0.88);
      if (dp.life <= 0 || dp.y > window.innerHeight + 30) {
        dp.el.remove();
        dropPool.splice(i, 1);
      }
    }
  }

  function lerp(a, b, t) { return a + (b-a) * t; }
  function lerpHex(c1, c2, t) {
    t = Math.max(0, Math.min(1, t));
    var r1=parseInt(c1.slice(1,3),16), g1=parseInt(c1.slice(3,5),16), b1=parseInt(c1.slice(5,7),16);
    var r2=parseInt(c2.slice(1,3),16), g2=parseInt(c2.slice(3,5),16), b2=parseInt(c2.slice(5,7),16);
    var r=Math.round(r1+(r2-r1)*t).toString(16).padStart(2,'0');
    var g=Math.round(g1+(g2-g1)*t).toString(16).padStart(2,'0');
    var b=Math.round(b1+(b2-b1)*t).toString(16).padStart(2,'0');
    return '#'+r+g+b;
  }
  function clamp01(v) { return Math.max(0, Math.min(1, v)); }
  function easeIn(t)  { return t*t; }
  function easeOut(t) { return 1-(1-t)*(1-t); }

  var PC = ['#f8d030','#ddb820','#a07c18','#5a380e','#1e1004'];
  var SC = ['#347c1e','#708018','#4a5408','#2e2808','#101004'];
  var LC = ['#3a8e22','#889010','#7a6408','#4a3808','#161004'];
  var CC = ['#8a5020','#4a2c10','#2a1408','#100804','#060202'];

  function samplePalette(pal, t) {
    t = clamp01(t);
    var n = pal.length - 1;
    var i = Math.min(n-1, Math.floor(t * n));
    var f = (t * n) - i;
    return lerpHex(pal[i], pal[i+1], f);
  }

  var petalDroop   = new Array(16).fill(0);
  var petalCurl    = new Array(16).fill(0);
  var petalFallen  = new Array(16).fill(false);
  var petalFallProg= new Array(16).fill(0);
  var petalOffset  = Array.from({length:16}, function() { return 0.7 + Math.random()*0.6; });
  var moldSpawned  = false;
  var lastLabelMsg = '';

  var spotsAdded = false;

  function addWaterSpots() {
    if (spotsAdded) return;
    spotsAdded = true;
    var svg = document.getElementById('main-svg');
    var ns  = 'http://www.w3.org/2000/svg';
    var spotData = [
      {cx:102, cy:200, rx:4, ry:3, rot:-20},
      {cx:118, cy:215, rx:3, ry:2, rot:10},
      {cx:196, cy:185, rx:5, ry:3, rot:15},
      {cx:182, cy:210, rx:3, ry:2.5, rot:-8},
      {cx:90,  cy:240, rx:3, ry:2, rot:25},
      {cx:210, cy:230, rx:4, ry:2.5, rot:-18},
    ];
    spotData.forEach(function(s, i) {
      var e = document.createElementNS(ns, 'ellipse');
      e.setAttribute('cx', s.cx); e.setAttribute('cy', s.cy);
      e.setAttribute('rx', s.rx); e.setAttribute('ry', s.ry);
      e.setAttribute('fill', 'rgba(10,20,5,0.55)');
      e.setAttribute('transform', 'rotate('+s.rot+' '+s.cx+' '+s.cy+')');
      e.style.opacity = '0';
      e.style.transition = 'opacity '+(2+i*0.4)+'s ease';
      e.setAttribute('class','water-spot');
      svg.appendChild(e);
    });
  }

  function applyDecay(t) {

    var tY  = clamp01(easeIn(t * 2.2));
    var tW  = clamp01(easeIn(clamp01((t - 0.18) * 2.8)));
    var tB  = clamp01(easeIn(clamp01((t - 0.40) * 2.6)));
    var tSK = clamp01(easeOut(clamp01((t - 0.25) * 2.4)));
    var tHD = clamp01(easeOut(clamp01((t - 0.20) * 2.0)));
    var tC  = clamp01(easeIn(clamp01((t - 0.70) * 3.8)));
    var tM  = clamp01(clamp01((t - 0.55) * 3.0));
    var tSP = clamp01(clamp01((t - 0.15) * 4.0));

    var pColor = samplePalette(PC, tY*0.35 + tB*0.45 + tC*0.20);
    var pColorDark = samplePalette(PC, tY*0.40 + tB*0.50 + tC*0.10);

    document.getElementById('pa0').setAttribute('stop-color', samplePalette(PC, tY*0.30));
    document.getElementById('pa1').setAttribute('stop-color', samplePalette(PC, tY*0.38 + tB*0.30));
    document.getElementById('pa2').setAttribute('stop-color', pColorDark);
    document.getElementById('pb0').setAttribute('stop-color', samplePalette(PC, tY*0.28));
    document.getElementById('pb1').setAttribute('stop-color', samplePalette(PC, tY*0.36 + tB*0.28));
    document.getElementById('pb2').setAttribute('stop-color', pColorDark);
    document.getElementById('pc0').setAttribute('stop-color', samplePalette(PC, tY*0.32 + tB*0.20));
    document.getElementById('pc1').setAttribute('stop-color', samplePalette(PC, tY*0.42 + tB*0.35));

    var outerPetals = document.querySelectorAll('#g-petals-outer ellipse');
    var innerPetals = document.querySelectorAll('#g-petals-inner ellipse');

    outerPetals.forEach(function(p, i) {
      var offset = petalOffset[i];
      var droopT = clamp01((tW - 0.05*((i%4)+1)*0.3) * offset);
      petalDroop[i] = droopT;

      var curlT  = clamp01((tB - 0.08*((i%3)+1)*0.25) * offset);
      petalCurl[i] = curlT;

      var fallThreshold = 0.68 + (i / 16) * 0.28;
      if (t >= fallThreshold && !petalFallen[i]) {
        petalFallProg[i] = Math.min(1, petalFallProg[i] + 0.012);
      }

      var origRot = p.getAttribute('data-rot') || '0';
      var droopPx  = droopT * 18;
      var scaleY   = 1 - curlT * 0.35;
      var scaleX   = 1 + curlT * 0.12;
      var fallDY   = petalFallProg[i] * 60;
      var fallOp   = 1 - petalFallProg[i];

      var fullTransform = origRot +
        ' translate(0,' + droopPx.toFixed(1) + ')' +
        ' scale(' + scaleX.toFixed(3) + ',' + scaleY.toFixed(3) + ')' +
        ' translate(0,' + fallDY.toFixed(1) + ')';
      p.setAttribute('transform', fullTransform);
      p.setAttribute('opacity', (fallOp * (1 - tC*0.15)).toFixed(3));
    });

    if (!outerPetals[0].getAttribute('data-rot')) {
      var rotValues = ['','rotate(22.5 150 10)','rotate(45 150 10)','rotate(67.5 150 10)',
        'rotate(90 150 10)','rotate(112.5 150 10)','rotate(135 150 10)','rotate(157.5 150 10)',
        'rotate(180 150 10)','rotate(202.5 150 10)','rotate(225 150 10)','rotate(247.5 150 10)',
        'rotate(270 150 10)','rotate(292.5 150 10)','rotate(315 150 10)','rotate(337.5 150 10)'];
      outerPetals.forEach(function(p, i) { p.setAttribute('data-rot', rotValues[i]); });
    }

    innerPetals.forEach(function(p) {
      p.setAttribute('fill', samplePalette(PC, tY*0.28 + tB*0.40));
      p.setAttribute('opacity', (1 - tC*0.85).toFixed(3));
    });

    document.getElementById('dc0').setAttribute('stop-color', samplePalette(CC, tB*0.45 + tC*0.35));
    document.getElementById('dc1').setAttribute('stop-color', samplePalette(CC, tB*0.50 + tC*0.40));
    document.getElementById('dc2').setAttribute('stop-color', samplePalette(CC, tB*0.55 + tC*0.45));
    document.getElementById('g-seeds').setAttribute('opacity', (0.65 - tB*0.35 - tC*0.25).toFixed(3));

    var sc = samplePalette(SC, tY*0.25 + tW*0.20 + tB*0.40 + tC*0.15);
    document.getElementById('sg0').setAttribute('stop-color', lerpHex(sc,'#000000',0.20));
    document.getElementById('sg1').setAttribute('stop-color', sc);
    document.getElementById('sg2').setAttribute('stop-color', lerpHex(sc,'#000000',0.25));

    var stemLean   = tSK * 16;
    var stemBuckle = tC  * 18;
    document.getElementById('g-stem').style.transform =
      'rotate(' + (stemLean + stemBuckle).toFixed(2) + 'deg)';

    var headDeg = tHD * 38 + tC * 30;
    var headDY  = tHD * 8  + tC * 30;
    var headOp  = 1 - tC * 0.45;
    document.getElementById('g-head').style.transform =
      'rotate('+headDeg.toFixed(2)+'deg) translateY('+headDY.toFixed(1)+'px)';
    document.getElementById('g-head').style.opacity = headOp.toFixed(3);

    var lc = samplePalette(LC, tY*0.30 + tW*0.15 + tB*0.40 + tC*0.15);
    var lc2 = samplePalette(LC, tY*0.32 + tW*0.16 + tB*0.42 + tC*0.10);
    ['lg0','lg1','lg2','lg3','lg4','lg5','lg6','lg7'].forEach(function(id, i) {
      document.getElementById(id).setAttribute('stop-color', i%2===0 ? lc : lc2);
    });
    var ld = tW * 14 + tC * 24;
    document.getElementById('leaf-ul-g').style.transform = 'rotate('+(ld*0.65).toFixed(1)+'deg)';
    document.getElementById('leaf-ur-g').style.transform = 'rotate(-'+(ld*0.55).toFixed(1)+'deg)';
    document.getElementById('leaf-ll-g').style.transform = 'rotate('+(ld*0.90).toFixed(1)+'deg)';
    document.getElementById('leaf-lr-g').style.transform = 'rotate(-'+(ld*0.80).toFixed(1)+'deg)';

    var leafOp = 1 - tC * 0.55;
    ['leaf-ul-g','leaf-ur-g','leaf-ll-g','leaf-lr-g'].forEach(function(id) {
      document.getElementById(id).style.opacity = leafOp.toFixed(3);
    });

    if (tSP > 0) {
      addWaterSpots();
      document.querySelectorAll('.water-spot').forEach(function(s, i) {
        var stag = clamp01((tSP - i*0.08) * 3);
        s.style.opacity = (stag * 0.7).toFixed(3);
      });
    }

    var soilT = clamp01(t * 1.8);
    document.getElementById('sg-soil0').setAttribute('stop-color', lerpHex('#2e1c0a','#0a1008', soilT));
    document.getElementById('sg-soil1').setAttribute('stop-color', lerpHex('#1a1006','#060e06', soilT));
    document.getElementById('e-soil').setAttribute('fill', t > 0.25 ? 'url(#wetSoil)' : 'url(#soilGrad)');

    if (t > 0.04) {
      var pw = Math.min(210, t * 380);
      var ph = Math.min(36,  t * 68);
      var po = Math.min(0.92, t * 2.5);
      document.getElementById('puddle').style.width   = pw + 'px';
      document.getElementById('puddle').style.height  = ph + 'px';
      document.getElementById('puddle').style.opacity = po;
    }

    if (tM > 0 && !moldSpawned) { moldSpawned = true; spawnMold(); }
    if (tM > 0) {
      document.querySelectorAll('.mold-spore').forEach(function(s, i) {
        var stag = clamp01((tM - i*0.055) * 2.5);
        s.style.opacity = (stag * 0.85).toFixed(3);
      });
    }

    if (tB > 0) {
      document.getElementById('bg').style.background =
        'radial-gradient(ellipse 60% 40% at 50% 0%,' +
          lerpHex('#1a1408','#0a1008', tB) + ' 0%, transparent 70%),' +
        'radial-gradient(ellipse 80% 50% at 20% 80%, #0e0a04 0%, transparent 60%),' +
        'radial-gradient(ellipse 80% 50% at 80% 80%, #0e0a04 0%, transparent 60%),' +
        lerpHex('#07050a','#04080a', tB);
    }

    var msgs = [
      [0.06, 'the soil grows heavy.'],
      [0.20, 'the colour is leaving.'],
      [0.34, 'it begins to lean.'],
      [0.50, 'the leaves curl inward.'],
      [0.64, 'the smell of rot.'],
      [0.78, 'something is ending.'],
      [0.90, 'it cannot be saved now.'],
    ];
    var msg = '';
    for (var i = msgs.length-1; i >= 0; i--) {
      if (t >= msgs[i][0]) { msg = msgs[i][1]; break; }
    }
    var label = document.getElementById('stage-label');
    if (msg && msg !== lastLabelMsg) {
      lastLabelMsg = msg;
      label.classList.remove('show','urgent');
      setTimeout((function(m, urgent){ return function(){
        label.textContent = m;
        label.classList.add('show');
        if (urgent) label.classList.add('urgent');
      };})(msg, t > 0.72), 700);
    }

    if (t >= 1 && document.getElementById('falling-note').style.display === 'none') {
      var note = document.getElementById('falling-note');
      note.style.display = 'block';
      note.classList.add('drop');
      label.classList.remove('show','urgent');
      note.addEventListener('animationend', function() {
        note.classList.remove('drop');
        note.classList.add('landed');
        note.onclick = openPaper;
        setTimeout(function() {
          label.textContent = 'something stirs beneath.';
          label.classList.add('show','urgent');
        }, 400);
      }, { once: true });
    }
  }

  function spawnMold() {
    var g = document.getElementById('g-mold');
    var pts = [
      {x:148,y:82,r:3.5},{x:155,y:72,r:2.8},{x:140,y:68,r:3},
      {x:152,y:90,r:2.5},{x:144,y:78,r:2.2},{x:158,y:84,r:3.2},
      {x:138,y:86,r:2},{x:162,y:76,r:2.8},{x:145,y:58,r:2.2},
      {x:153,y:62,r:1.8},{x:136,y:74,r:2.5},{x:164,y:88,r:2},
    ];
    pts.forEach(function(p, i) {
      var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', p.r);
      c.setAttribute('class','mold-spore');
      c.setAttribute('fill','url(#moldGrad)');
      c.style.opacity = '0';
      c.style.transition = 'opacity ' + (3 + i*0.3) + 's ease';
      g.appendChild(c);
    });
  }

  function openPaper()  { document.getElementById('paper-overlay').classList.add('show'); }
  function closePaper() { document.getElementById('paper-overlay').classList.remove('show'); }

  function spawnDust() {
    var d = document.createElement('div');
    d.className = 'dust';
    var sz = 1.5 + Math.random()*2.5;
    d.style.cssText =
      'width:'+sz+'px;height:'+sz+'px;' +
      'left:'+(10+Math.random()*80)+'vw;' +
      'bottom:'+(38+Math.random()*28)+'vh;' +
      '--dx:'+(Math.random()*50-25)+'px;' +
      'animation-duration:'+(7+Math.random()*10)+'s;' +
      'animation-delay:'+(Math.random()*3)+'s;';
    document.getElementById('scene').appendChild(d);
    setTimeout(function(){ d.remove(); spawnDust(); }, 7000+Math.random()*10000);
  }
  spawnDust(); spawnDust(); spawnDust(); spawnDust();

  function loop(ts) {
    if (!lastTime) lastTime = ts;
    var dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    if (isPouring && decay < 1) {
      decay += dt / DECAY_FULL;
      decay  = Math.min(1, decay);
      applyDecay(decay);

      dropTimer += dt;
      var dropInterval = 42 - decay * 18;
      while (dropTimer > dropInterval) {
        spawnDroplet();
        dropTimer -= dropInterval;
      }
    }

    if (decay > 0.68) {
      var anyFalling = false;
      var outerPetals = document.querySelectorAll('#g-petals-outer ellipse');
      outerPetals.forEach(function(p, i) {
        var fallThreshold = 0.68 + (i / 16) * 0.28;
        if (decay >= fallThreshold && petalFallProg[i] < 1) {
          petalFallProg[i] = Math.min(1, petalFallProg[i] + dt * 0.0008);
          anyFalling = true;
          var origRot = p.getAttribute('data-rot') || '';
          var droopPx = petalDroop[i] * 18;
          var scaleY  = 1 - petalCurl[i] * 0.35;
          var scaleX  = 1 + petalCurl[i] * 0.12;
          var fallDY  = petalFallProg[i] * 60;
          var fallOp  = Math.max(0, 1 - petalFallProg[i]);
          p.setAttribute('transform',
            origRot +
            ' translate(0,' + droopPx.toFixed(1) + ')' +
            ' scale(' + scaleX.toFixed(3) + ',' + scaleY.toFixed(3) + ')' +
            ' translate(0,' + fallDY.toFixed(1) + ')');
          p.setAttribute('opacity', fallOp.toFixed(3));
        }
      });
    }

    updateDroplets(dt);
    requestAnimationFrame(loop);
  }

  canEl.style.left = canX + 'px';
  canEl.style.top  = canY + 'px';
  requestAnimationFrame(loop);
</script>
</body>
</html>
